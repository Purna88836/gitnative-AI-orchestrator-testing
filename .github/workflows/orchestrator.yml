name: AI Orchestrator

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]
  # pull_request:
  #   types: [opened, synchronize, reopened]
  # workflow_run:
  #   workflows: ["*"]
    types: [completed]
  # schedule:
  #   - cron: "0 5 * * 1"

concurrency:
  group: orchestrator-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read
  packages: read

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'issue_comment' ||
      contains(github.event.comment.body, '@orchestrator')
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull orchestrator image
        run: docker pull ghcr.io/purna88836/git-native-agentic-ai-orchestrator:latest

      - name: Run AI Orchestrator
        run: |
          docker run --rm \
            -e GITHUB_TOKEN="${{ secrets.COPILOT_TOKEN }}" \
            -e ORCHESTRATOR_CONFIG_PATH=".orchestrator/config.yaml" \
            -e GITHUB_REPOSITORY="${{ github.repository }}" \
            -e GITHUB_EVENT_NAME="${{ github.event_name }}" \
            -e GITHUB_EVENT_PATH="/github/workflow/event.json" \
            -e GITHUB_RUN_ID="${{ github.run_id }}" \
            -e GITHUB_SERVER_URL="${{ github.server_url }}" \
            -e GITHUB_WORKSPACE="/github/workspace" \
            -v "${{ github.workspace }}:/github/workspace" \
            -v "${{ github.event_path }}:/github/workflow/event.json:ro" \
            -w /github/workspace \
            ghcr.io/purna88836/git-native-agentic-ai-orchestrator:latest
